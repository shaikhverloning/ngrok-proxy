version: '3.8'

services:
  ngrok-proxy:
    image: nginx:alpine
    container_name: ngrok-nginx-proxy
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ${NETWORK_NAME}

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    command: http ${NGROK_TARGET_HOST}:${NGROK_TARGET_PORT}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - ngrok-proxy
    networks:
      - ${NETWORK_NAME}

networks:
  verloning-network:
    external: true