events {}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://verloning-nginx:80;

      proxy_set_header Host mijn.verloning.test;
      proxy_set_header X-Forwarded-Host mijn.verloning.test;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port 443;

      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_redirect off;
    }
  }
}